version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./src_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      # Mount source code for hot-reloading during development
      - ./src_api:/app
    # Override the Dockerfile CMD to run Gunicorn ONLY
    # (Migrations and Collectstatic are handled by the startup script below)
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn --bind 0.0.0.0:8000 --reload fed_api.wsgi:application
      "

  celery-worker:
    build: 
      context: ./src_api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./src_api:/app
    # Run Celery Worker ONLY
    command: >
      sh -c "
        celery -A fed_api worker --loglevel=info
      "

volumes:
  postgres_data:
  redis_data:




