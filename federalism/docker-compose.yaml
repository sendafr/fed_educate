version: '3.8'

services:
  # --- Database ---
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- Backend (Django API) ---
  backend:
    build: 
      context: ./src_api
      dockerfile: Dockerfile
    
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./src_api:/app
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn --bind 0.0.0.0:8000 --reload fed_api.wsgi:application
      "

  # --- Celery Worker ---
  celery-worker:
    build: 
      context: ./src_api
      dockerfile: Dockerfile
    
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./src_api:/app
    command: >
      sh -c "
        celery -A fed_api worker --loglevel=info
      "

  # --- Frontend (React/Vue/Angular/etc.) ---
  frontend:
    build:
      context: ./fed-frontend
      dockerfile: Dockerfile
    

    ports:
      - "5173:5173"  # Adjust port if your frontend uses a different one (e.g., 3000)
    depends_on:
      - backend
    # Optional: Add environment variables for API URL if needed
    environment:
      - VITE_API_URL=http://localhost:8000
      # Or if using React, you might need:
      # - REACT_APP_API_URL=http://localhost:8000

volumes:
  postgres_data:
  redis_data: